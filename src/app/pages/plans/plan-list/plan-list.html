<div class="main-page-container">
  <div class="userlist">
    <div class="filters d-flex mb-2">
      <h1>Plans</h1>
    </div>

    <!-- Table or Empty State -->
    <ng-container>
      <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 w-100">
        <!-- Plan Name Column -->
        <ng-container matColumnDef="planName">
          <th mat-header-cell *matHeaderCellDef>Plan Name</th>
          <td mat-cell *matCellDef="let element">{{ element.planName }}</td>
        </ng-container>

        <!-- Amount Column -->
        <ng-container matColumnDef="amount">
          <th mat-header-cell *matHeaderCellDef>Amount</th>
          <td mat-cell *matCellDef="let element">{{ element.currency }} {{ element.amount }}</td>
        </ng-container>

        <!-- Billing Period Column -->
        <ng-container matColumnDef="billingInterval">
          <th mat-header-cell *matHeaderCellDef>Billing Period</th>
          <td mat-cell *matCellDef="let element">{{ element.billingInterval }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="Actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let element">
            <button class="btn btn-warning" aria-label="View Plan Details">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </ng-container>
  </div>
</div>
